services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    c975L\SocialBundle\:
        resource: '../src/'
        exclude: '../src/{DependencyInjection,Entity}'

    c975L\SocialBundle\Service\StylesheetProvider:
        tags:
            - { name: 'ui.stylesheet', priority: 100 }

    c975L\SocialBundle\Service\ScriptProvider:
        tags:
            - { name: 'ui.script', priority: 100 }
            - { name: 'ui.admin_script', priority: 100 }

    social.block.social_links:
        class: stdClass
        tags:
            - name: ui.block
              kind: social_links
              label: "block.social_links"
              description: "block.social_links_description"
              translation_domain: 'social'
              form: c975L\SocialBundle\Form\Block\SocialLinksType
              template: '@c975LSocial/blocks/SocialLinks.html.twig'
              category: 'label.category_navigation'
              pickable: false
              cacheable: true

    # Pickable pointer to the singleton above - no data of its own, so it can be dropped on any page
    # without re-defining the links (see SocialLinksDisplayType / SocialLinksDisplay.html.twig)
    social.block.social_links_display:
        class: stdClass
        tags:
            - name: ui.block
              kind: social_links_display
              label: "block.social_links_display"
              description: "block.social_links_display_description"
              translation_domain: 'social'
              form: c975L\SocialBundle\Form\Block\SocialLinksDisplayType
              template: '@c975LSocial/blocks/SocialLinksDisplay.html.twig'
              category: 'label.category_navigation'
              pickable: true
              # Its render depends on the "social_links" singleton's data, not its own - caching it
              # under its own block id would go stale whenever the singleton is edited elsewhere
              cacheable: false
